name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Verify token
        run: vercel whoami --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Write env file
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" >> web/.env.production
          echo "NEXT_PUBLIC_SUPABASE_ANON=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON }}" >> web/.env.production

      - name: Deploy to Vercel
        working-directory: web
        run: vercel --prod --token "${{ secrets.VERCEL_TOKEN }}" --name pilotmirror --yes --debug 2>&1
